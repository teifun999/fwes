name: RemoteControlApp
options:
  bundleIdPrefix: com.remoteemucontrol
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

targets:
  RemoteControlApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      - path: Views
      - path: Services
    info:
      path: Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remoteemucontrol.app
        PRODUCT_NAME: RemoteControlApp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # Signing is intentionally disabled here - the CI build produces an UNSIGNED .ipa.
        # Signing happens afterwards on your Windows PC via Sideloadly using your Apple ID
        # (see docs/BUILD_WITHOUT_MAC.md). This avoids needing any Apple Developer certificates
        # or provisioning profiles inside the CI pipeline.
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
